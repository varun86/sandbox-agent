        background: rgba(255, 159, 10, 0.12);
      }

      .event-icon.permission,
      .event-icon.permission-requested,
      .event-icon.permission-resolved {
        color: var(--purple);
        border-color: rgba(191, 90, 242, 0.35);
        background: rgba(191, 90, 242, 0.12);
      }

      .event-time {
        font-size: 10px;
        color: var(--muted);
      }

      .event-id {
        font-size: 11px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
      }

      .event-payload {
        margin: 0 12px 12px;
      }

      .code-block {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 10px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 10px;
        line-height: 1.5;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--text-secondary);
        margin-top: 8px;
      }

      .code-block .key { color: var(--warning); }
      .code-block .string { color: var(--success); }
      .code-block .number { color: var(--cyan); }
      .code-block .boolean { color: var(--purple); }

      /* Log */
      .log-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        margin-bottom: 8px;
      }

      .log-item:last-child {
        margin-bottom: 0;
      }

      .log-method {
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
      }

      .log-url {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 10px;
        color: var(--muted);
        word-break: break-all;
      }

      .log-status {
        font-size: 11px;
        font-weight: 600;
      }

      .log-status.ok { color: var(--success); }
      .log-status.error { color: var(--danger); }

      .log-meta {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 10px;
        color: var(--muted);
      }

      .copy-button {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: transparent;
        border: 1px solid var(--border-2);
        color: var(--text-secondary);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 10px;
        cursor: pointer;
        transition: border-color var(--transition);
      }

      .copy-button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .copy-button svg {
        width: 12px;
        height: 12px;
      }

      /* Question/Permission Forms */
      .option-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }

      .option-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
      }

      .option-item input {
        margin-top: 2px;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
      }

      .muted {
        color: var(--muted);
      }

      .inline-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .text-truncate {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Feature Coverage Badges */
      .feature-coverage-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .feature-coverage-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
      }

      .feature-coverage-badge.enabled {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .feature-coverage-badge.disabled {
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted-2);
      }

      .feature-coverage-badge svg {
        flex-shrink: 0;
      }

      @media (max-width: 900px) {
        .process-run-row {
          flex-direction: column;
        }

        .process-run-output {
          grid-template-columns: 1fr;
        }

        .process-run-output-section + .process-run-output-section {
          border-left: none;
          border-top: 1px solid var(--border);
        }

        .process-terminal-meta {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      /* Scrollbar - match landing page */
      * {
        scrollbar-width: thin;
        scrollbar-color: #3f3f46 transparent;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 9999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }

      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Responsive */
      @media (max-width: 1200px) {
        .main-layout {
          grid-template-columns: 180px 1fr 1fr;
        }
      }

      @media (max-width: 1024px) {
        .main-layout {
          grid-template-columns: 1fr;
        }

        .desktop-state-grid,
        .desktop-start-controls,
        .desktop-advanced-grid {
          grid-template-columns: 1fr;
        }

        .session-sidebar {
          display: none;
        }

        .chat-panel {
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: 50vh;
        }
      }

      @media (max-width: 640px) {
        .landing {
          padding: 20px;
        }

        .header {
          padding: 10px 16px;
        }

        .header-title {
          display: none;
        }
      }

      /* Toast notifications - centered cutout/drop style */
      .toast-stack {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: min(680px, calc(100vw - 20px));
        pointer-events: none;
      }

      .toast {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: min(620px, 100%);
        min-height: 32px;
        padding: 5px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        color: #fff;
        font-size: 11px;
        font-weight: 500;
        animation: toast-slide-in 0.24s cubic-bezier(0.22, 0.61, 0.36, 1);
        pointer-events: auto;
      }

      .toast-content {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
        min-width: 0;
        padding-right: 6px;
      }

      .toast-title {
        font-weight: 600;
        letter-spacing: 0.01em;
        white-space: nowrap;
        line-height: 1.2;
      }

      .toast-message {
        opacity: 0.9;
        color: #d4d4d8;
        font-size: 10px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .toast-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        width: 18px;
        height: 18px;
        color: #fff;
        cursor: pointer;
        padding: 0;
        font-size: 12px;
        line-height: 1;
        opacity: 0.7;
        transition: opacity var(--transition), background var(--transition), border-color var(--transition);
        flex-shrink: 0;
      }

      .toast-close:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.24);
      }

      @keyframes toast-slide-in {
        from {
          transform: translateY(-16px) scale(0.98);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
