<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sandbox Agent</title>
    <!-- Preconnect to font providers -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        /* Match landing page colors - high contrast */
        --bg: #000000;
        --bg-panel: #0a0a0b;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.18);
        --border-2: rgba(255, 255, 255, 0.14);
        --input-bg: rgba(255, 255, 255, 0.07);
        --input-border: rgba(255, 255, 255, 0.22);
        --text: #ffffff;
        --text-secondary: #e4e4e7; /* zinc-200 */
        --muted: #a1a1aa; /* zinc-400 */
        --muted-2: #8b8b93; /* between zinc-400 and zinc-500 */
        --accent: #ff4f00;
        --accent-hover: #ff6a00;
        --success: #4ade80; /* green-400 */
        --warning: #fbbf24; /* amber-400 */
        --danger: #dc2626; /* red-600 */
        --purple: #a78bfa; /* violet-400 */
        --cyan: #22d3ee; /* cyan-400 */
        --radius: 8px;
        --radius-sm: 6px;
        --radius-lg: 16px;
        --transition: 200ms ease;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        height: 100%;
        background: var(--bg);
      }

      body {
        color: var(--text);
        font-family: 'Manrope', system-ui, sans-serif;
        font-weight: 500;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Text selection - match landing page */
      ::selection {
        background-color: rgba(255, 79, 0, 0.3);
        color: #fed7aa;
      }

      ::-moz-selection {
        background-color: rgba(255, 79, 0, 0.3);
        color: #fed7aa;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      /* App Layout */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 11px;
        color: #fff;
      }

      .header-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-endpoint {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 11px;
        color: var(--muted);
      }

      .header-link {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        background: transparent;
        border: 1px solid transparent;
        transition: all var(--transition);
      }

      .header-link:hover {
        color: var(--text);
        background: var(--surface);
        border-color: var(--border);
      }

      .header-link svg {
        opacity: 0.7;
      }

      .header-link:hover svg {
        opacity: 1;
      }

      .status-indicator.disconnected {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }

      /* Landing Page */
      .landing {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        overflow: auto;
      }

      .landing-container {
        width: 100%;
        max-width: 420px;
      }

      .landing-hero {
        text-align: center;
        margin-bottom: 32px;
      }

      .landing-logo {
        width: 56px;
        height: 56px;
        background: var(--accent);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        color: #fff;
        margin: 0 auto 20px;
      }

      .landing-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text);
      }

      .landing-subtitle {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .connect-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        transition: border-color var(--transition);
      }

      .connect-card:hover {
        border-color: rgba(255, 255, 255, 0.2);
      }

      .connect-card-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .field:last-of-type {
        margin-bottom: 20px;
      }

      .label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }

      .input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text);
        outline: none;
        transition: border-color var(--transition);
      }

      .input:focus {
        border-color: var(--accent);
      }

      .input::placeholder {
        color: var(--muted-2);
      }

      .textarea {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text);
        outline: none;
        transition: border-color var(--transition);
        resize: vertical;
        min-height: 100px;
        font-family: inherit;
      }

      .textarea:focus {
        border-color: var(--accent);
      }

      .select {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text);
        outline: none;
        cursor: pointer;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: var(--radius);
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition);
      }

      .button.primary {
        background: #ffffff;
        color: #000000;
        width: 100%;
      }

      .button.primary:hover:not(:disabled) {
        background: #e4e4e7;
      }

      .button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }

      .button.secondary:hover:not(:disabled) {
        border-color: rgba(255, 255, 255, 0.2);
      }

      .button.ghost {
        background: transparent;
        color: var(--text-secondary);
        padding: 6px 10px;
      }

      .button.ghost:hover:not(:disabled) {
        background: var(--surface);
        color: var(--text);
      }

      .button.danger {
        background: var(--danger);
        color: #fff;
      }

      .button.success {
        background: var(--success);
        color: #000;
      }

      .button.small {
        padding: 8px 14px;
        font-size: 12px;
      }

      .button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .button-icon {
        width: 14px;
        height: 14px;
      }

      .banner {
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        margin-bottom: 16px;
      }

      .banner.error {
        background: rgba(255, 59, 48, 0.1);
        border-left: 3px solid var(--danger);
        color: var(--danger);
      }

      .banner.config-note {
        background: rgba(255, 159, 10, 0.12);
        border-left: 3px solid var(--warning);
        color: var(--warning);
      }

      .banner.success {
        background: rgba(48, 209, 88, 0.1);
        border-left: 3px solid var(--success);
        color: var(--success);
      }

      .banner.warning {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: rgba(255, 159, 10, 0.1);
        border-left: 3px solid var(--warning);
        color: var(--warning);
      }

      .banner.warning svg {
        flex-shrink: 0;
        margin-top: 1px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 16px;
        line-height: 1.5;
      }

      .hint code {
        background: var(--surface-2);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 10px;
      }

      .persist-callout {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 24px;
        padding: 12px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        color: var(--muted);
      }

      .persist-callout svg {
        flex-shrink: 0;
        color: var(--muted);
      }

      /* Main Layout (Connected) */
      .main-layout {
        display: grid;
        grid-template-columns: 200px 1fr 1fr;
        flex: 1;
        overflow: hidden;
        transition: grid-template-columns 0.2s ease;
      }

      .main-layout.debug-collapsed {
        grid-template-columns: 200px 1fr 42px;
      }

      /* Session Sidebar */
      .session-sidebar {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--bg-panel);
        overflow: visible;
      }

      .sidebar-header {
        height: 41px;
        padding: 0 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        overflow: visible;
      }

      .sidebar-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        position: relative;
        overflow: visible;
      }

      .sidebar-header-actions .button.secondary.small {
        width: 24px;
        height: 24px;
        min-width: 24px;
        padding: 0;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-header-actions .button.secondary.small.active {
        background: #fff;
        color: #000;
        border-color: #fff;
      }

      .sidebar-icon-btn {
        width: 24px;
        height: 24px;
        background: transparent;
        border: 1px solid var(--border-2);
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
      }

      .sidebar-icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .sidebar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .sidebar-add-btn {
        width: 24px;
        height: 24px;
        background: var(--accent);
        border: none;
        border-radius: 4px;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
      }

      .sidebar-add-btn:hover {
        background: var(--accent-hover);
      }

      .sidebar-add-menu-wrapper {
        position: relative;
      }

      .sidebar-add-menu,
      .session-create-menu {
        position: absolute;
        top: 36px;
        left: 0;
        min-width: 220px;
        background: #000000;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 60;
      }

      .session-create-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 6px 4px;
        margin-bottom: 4px;
      }

      .session-create-back {
        width: 24px;
        height: 24px;
        background: transparent;
        border: 1px solid var(--border-2);
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        flex-shrink: 0;
      }

      .session-create-back:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .session-create-agent-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      .session-create-form {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 4px 2px;
      }

      .session-create-form .setup-field {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        height: 28px;
      }

      .session-create-form .setup-label {
        width: 72px;
        flex-shrink: 0;
        text-align: right;
      }

      .session-create-form .setup-select,
      .session-create-form .setup-input {
        flex: 1;
        min-width: 0;
      }

      .session-create-section {
        overflow: hidden;
      }

      .session-create-section-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        height: 28px;
        padding: 0;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 11px;
        cursor: pointer;
        transition: color var(--transition);
      }

      .session-create-section-toggle:hover {
        color: var(--text);
      }

      .session-create-section-toggle .setup-label {
        width: 72px;
        flex-shrink: 0;
        text-align: right;
      }

      .session-create-section-count {
        font-size: 11px;
        font-weight: 400;
        color: var(--muted);
      }

      .session-create-section-arrow {
        margin-left: auto;
        color: var(--muted-2);
        flex-shrink: 0;
      }

      .session-create-section-body {
        margin: 4px 0 6px;
        padding: 8px;
        border: 1px solid var(--border-2);
        border-radius: 4px;
        background: var(--surface-2);
      }

      .session-create-textarea {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 10px;
        color: var(--text);
        outline: none;
        resize: vertical;
        min-height: 60px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        transition: border-color var(--transition);
      }

      .session-create-textarea:focus {
        border-color: var(--accent);
      }

      .session-create-textarea::placeholder {
        color: var(--muted-2);
      }

      .session-create-inline-error {
        font-size: 10px;
        color: var(--danger);
        margin-top: 4px;
        line-height: 1.4;
      }

      .session-create-skill-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 4px;
      }

      .session-create-skill-item {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 4px 3px 8px;
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: 4px;
      }

      .session-create-skill-path {
        flex: 1;
        min-width: 0;
        font-size: 10px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .session-create-skill-remove {
        width: 18px;
        height: 18px;
        background: transparent;
        border: none;
        border-radius: 3px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--transition);
      }

      .session-create-skill-remove:hover {
        color: var(--danger);
        background: rgba(255, 59, 48, 0.12);
      }

      .session-create-skill-add-row {
        display: flex;
      }

      .session-create-skill-input {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 10px;
        color: var(--text);
        outline: none;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
      }

      .session-create-skill-input::placeholder {
        color: var(--muted-2);
      }

      .session-create-skill-type-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        background: rgba(255, 79, 0, 0.15);
        color: var(--accent);
        flex-shrink: 0;
      }

      .session-create-skill-type-row {
        display: flex;
        gap: 4px;
      }

      .session-create-skill-type-select {
        width: 80px;
        flex-shrink: 0;
        background: var(--surface-2);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 10px;
        color: var(--text);
        outline: none;
        cursor: pointer;
      }

      .session-create-mcp-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 4px;
      }

      .session-create-mcp-item {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 4px 3px 8px;
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: 4px;
      }

      .session-create-mcp-info {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .session-create-mcp-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
      }

      .session-create-mcp-type {
        font-size: 9px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--muted);
        background: var(--surface);
        padding: 1px 4px;
        border-radius: 3px;
        white-space: nowrap;
      }

      .session-create-mcp-summary {
        font-size: 10px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .session-create-mcp-actions {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0;
      }

      .session-create-mcp-edit {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .session-create-mcp-name-input {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--text);
        outline: none;
      }

      .session-create-mcp-name-input:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .session-create-mcp-name-input::placeholder {
        color: var(--muted-2);
      }

      .session-create-mcp-edit-actions {
        display: flex;
        gap: 4px;
      }

      .session-create-mcp-save,
      .session-create-mcp-cancel {
        flex: 1;
        padding: 4px 8px;
        border-radius: 4px;
        border: none;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition);
      }

      .session-create-mcp-save {
        background: var(--accent);
        color: #fff;
      }

      .session-create-mcp-save:hover {
        background: var(--accent-hover);
      }

      .session-create-mcp-cancel {
        background: var(--border-2);
        color: var(--text-secondary);
      }

      .session-create-mcp-cancel:hover {
        background: var(--muted-2);
      }

      .session-create-add-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        width: 100%;
        padding: 4px 8px;
        background: transparent;
        border: 1px dashed var(--border-2);
        border-radius: 4px;
        color: var(--muted);
        font-size: 10px;
        cursor: pointer;
        transition: all var(--transition);
      }

      .session-create-add-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .session-create-actions {
        padding: 4px 2px 2px;
        margin-top: 4px;
      }

      .session-create-actions .button.primary {
        width: 100%;
        padding: 8px 12px;
        font-size: 12px;
      }

      /* Empty state variant of session-create-menu */
      .empty-state-menu-wrapper .session-create-menu {
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 8px;
      }

      .sidebar-add-option {
        background: transparent;
        border: 1px solid transparent;
        color: var(--text);
        text-align: left;
        padding: 6px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all var(--transition);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .sidebar-add-option:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.22);
        color: var(--text);
      }

      .sidebar-add-option:active,
      .sidebar-add-option:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.22);
        color: var(--text);
        outline: none;
      }

      .sidebar-add-option:hover .agent-badge,
      .sidebar-add-option:active .agent-badge,
      .sidebar-add-option:focus-visible .agent-badge {
        color: var(--muted);
      }

      .agent-option-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .agent-option-logo {
        width: 20px;
        height: 20px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .agent-option-name {
        white-space: nowrap;
        min-width: 0;
      }

      .agent-option-version {
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
      }

      .sidebar-add-option:hover .agent-option-version,
      .sidebar-add-option:active .agent-option-version,
      .sidebar-add-option:focus-visible .agent-option-version {
        color: var(--muted);
      }

      .agent-option-badges {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .agent-option-arrow {
        color: var(--muted-2);
        transition: color var(--transition);
      }

      .sidebar-add-option:hover .agent-option-arrow,
      .sidebar-add-option:active .agent-option-arrow,
      .sidebar-add-option:focus-visible .agent-option-arrow {
        color: var(--text-secondary);
      }

      .agent-divider {
        height: 1px;
        background: var(--border);
        margin: 6px 0;
      }

      .agent-badge {
        font-size: 10px;
        font-weight: 500;
        white-space: nowrap;
        transition: all var(--transition);
      }

      .agent-badge.installed {
        color: var(--muted);
        flex-shrink: 0;
      }


      .sidebar-add-status {
        padding: 6px 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .sidebar-add-status.error {
        color: var(--danger);
      }

      .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .session-item {
        display: flex;
        align-items: stretch;
        width: 100%;
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius);
        margin-bottom: 4px;
        transition: all var(--transition);
      }

      .session-item:last-child {
        margin-bottom: 0;
      }

      .session-item:hover {
        background: var(--surface);
        border-color: var(--border);
      }

      .session-item.active {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .session-item-content {
        flex: 1;
        background: transparent;
        border: none;
        padding: 12px;
        cursor: pointer;
        text-align: left;
      }

      .session-item-id {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 11px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }

      .session-item-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: var(--muted);
      }

      .session-item-agent {
        font-weight: 600;
        color: var(--accent);
      }

      .session-item.ended {
        opacity: 0.5;
      }

      .session-item.ended .session-item-agent {
        color: var(--muted);
      }

      .session-item-events {
        color: #a1a1aa;
        background: #3f3f46;
        padding: 2px 6px;
        border-radius: 8px;
        font-size: 10px;
      }

      .session-item-ended {
        color: #fecaca;
        background: #3f1212;
        padding: 2px 6px;
        border-radius: 8px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .sidebar-empty {
        padding: 16px;
        text-align: center;
        color: var(--muted);
        font-size: 11px;
      }

      .sidebar-empty.error {
        color: var(--danger);
      }

      .session-persistence-note {
        margin: 8px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
        flex-shrink: 0;
      }

      .session-persistence-note a {
        color: var(--text-secondary);
      }

      .session-persistence-note a:hover {
        color: var(--text);
      }

      /* Chat Panel */
      .chat-panel {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        overflow: hidden;
      }

      .panel-header {
        height: 41px;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .error-banner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        background: var(--danger);
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        flex-shrink: 0;
        text-align: center;
      }
      .error-banner svg {
        flex-shrink: 0;
      }

      .panel-header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .header-meta-pill {
        max-width: 320px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border-2);
        background: var(--surface-2);
        color: var(--text-secondary);
        font-size: 11px;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .session-id-display {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 12px;
        color: var(--text-secondary);
        background: none;
        border: 0;
        padding: 0;
        cursor: pointer;
      }

      .session-id-display:hover {
        color: var(--text);
      }

      .no-session-subtext {
        white-space: normal;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
      }

      .session-agent-display {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 18%, transparent);
        padding: 2px 6px;
        border-radius: 999px;
      }

      .session-agent-version {
        font-weight: 500;
        opacity: 0.7;
        margin-left: 4px;
      }

      .panel-header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .button.ghost.session-ended-status {
        background: transparent;
        border: 1px solid transparent;
        color: #dc2626 !important;
        opacity: 1 !important;
        cursor: default;
      }

      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .chat-conversation {
        display: flex;
        flex: 1;
        min-height: 0;
        flex-direction: column;
      }

      .messages-container:has(.empty-state) {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: var(--muted);
        text-align: center;
        padding: 48px 24px;
        gap: 0;
      }

      .empty-state-icon {
        width: 40px;
        height: 40px;
        color: var(--muted-2);
        margin-bottom: 20px;
        stroke-width: 1.5;
      }

      .empty-state-icon.accent {
        color: var(--accent);
        opacity: 0.7;
      }

      .empty-state-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 6px;
        letter-spacing: -0.01em;
      }

      .empty-state-text {
        font-size: 13px;
        max-width: 260px;
        line-height: 1.6;
        color: var(--text-secondary);
      }

      .empty-state .button {
        margin-top: 24px;
        width: auto;
      }

      .mock-agent-hint {
        margin-top: 16px;
        padding: 12px 16px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--radius);
        font-size: 12px;
        color: var(--text-secondary);
        max-width: 320px;
        line-height: 1.5;
      }

      .mock-agent-hint code {
        background: var(--border-2);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 11px;
      }

      .empty-state-menu-wrapper {
        position: relative;
      }

      .empty-state-menu {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 8px;
        min-width: 200px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 60;
      }

      .message {
        display: flex;
        gap: 10px;
      }

      .message.user {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .message.user .avatar {
        background: var(--accent);
        color: #fff;
      }

      .message.assistant .avatar {
        background: var(--border-2);
        color: var(--text);
      }

      .ai-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .message-content {
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        max-width: 80%;
        line-height: 1.6;
        font-size: 14px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .message.user .message-content {
        background: #ffffff;
        color: #000000;
        border-bottom-right-radius: 4px;
      }

      .message.assistant .message-content {
        background: none;
        border: none;
        color: var(--text-secondary);
        border-radius: 0;
        padding: 0 16px;
      }

      .message.system .avatar {
        background: var(--border-2);
        color: var(--text);
      }

      .message.tool .avatar {
        background: rgba(100, 210, 255, 0.2);
        color: var(--cyan);
      }

      .message.system .message-content {
        background: var(--surface-2);
        color: var(--muted);
        border: 1px solid var(--border-2);
      }

      .message.tool .message-content {
        background: rgba(100, 210, 255, 0.1);
        color: var(--text-secondary);
        border: 1px solid rgba(100, 210, 255, 0.25);
      }

      .message.error .message-content {
        background: rgba(255, 59, 48, 0.12);
        border: 1px solid rgba(255, 59, 48, 0.4);
        color: var(--danger);
      }

      .message.error .avatar {
        background: rgba(255, 59, 48, 0.2);
        color: var(--danger);
      }

      .message.no-avatar {
        padding-left: 12px;
      }

      .chat-loading-skeleton {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 14px 16px;
      }

      .chat-skeleton-row {
        display: flex;
      }

      .chat-skeleton-row.user {
        justify-content: flex-end;
      }

      .chat-skeleton-bubble {
        height: 42px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 25%,
          rgba(255, 255, 255, 0.12) 50%,
          rgba(255, 255, 255, 0.04) 75%
        );
        background-size: 220% 100%;
        animation: chat-skeleton-shimmer 1.35s ease-in-out infinite;
      }

      .chat-skeleton-bubble.w-sm { width: 32%; }
      .chat-skeleton-bubble.w-md { width: 46%; }
      .chat-skeleton-bubble.w-lg { width: 58%; }
      .chat-skeleton-bubble.w-xl { width: 72%; }

      @keyframes chat-skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .error-icon {
        color: var(--danger);
        flex-shrink: 0;
      }

      .system-icon {
        color: var(--muted);
        flex-shrink: 0;
      }

      /* Permission prompt */
      .permission-prompt {
        margin: 8px 0;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
      }

      .permission-prompt.resolved {
        opacity: 0.7;
      }

      .permission-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .permission-icon {
        color: var(--warning, #f59e0b);
        flex-shrink: 0;
      }

      .permission-prompt.resolved .permission-icon {
        color: var(--muted);
      }

      .permission-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      .permission-description {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        padding-left: 22px;
      }

      .permission-actions {
        display: flex;
        gap: 6px;
        padding-left: 22px;
      }

      .permission-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 500;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
      }

      .permission-btn:hover:not(:disabled) {
        background: var(--surface);
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .permission-btn.allow:hover:not(:disabled) {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.3);
        color: #22c55e;
      }

      .permission-btn.reject:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
        color: #ef4444;
      }

      .permission-btn:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .permission-btn.selected {
        opacity: 1;
      }

      .permission-btn.selected.allow {
        background: rgba(34, 197, 94, 0.15);
        border-color: rgba(34, 197, 94, 0.4);
        color: #22c55e;
      }

      .permission-btn.selected.reject {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.4);
        color: #ef4444;
      }

      .permission-btn.dimmed {
        opacity: 0.35;
      }

      .permission-auto-resolved {
        font-size: 11px;
        color: var(--muted);
        font-style: italic;
      }

      .status-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
      }

      .status-divider-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .status-divider-text {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      /* Collapsible Messages */
      .collapsible-message {
        border-radius: var(--radius);
        overflow: hidden;
      }

      .collapsible-header {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 8px 12px;
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        transition: color var(--transition);
        text-align: left;
      }

      .collapsible-header:hover {
        color: var(--text-secondary);
      }

      .collapsible-message.tool .collapsible-header {
        color: var(--cyan);
      }

      .collapsible-message.tool .collapsible-header:hover {
        color: var(--cyan);
      }

      .collapsible-message.error .collapsible-header {
        color: var(--danger);
      }

      .collapsible-message.system .collapsible-header {
        color: var(--muted);
      }

      .simple-status-message {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .simple-status-message.error {
        color: var(--danger);
      }

      .tool-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: rgba(100, 210, 255, 0.15);
        color: var(--cyan);
        font-size: 10px;
        font-weight: 600;
      }

      .collapsible-content {
        padding: 0 12px 12px 38px;
        font-size: 13px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      /* Tool Group - Connected Chain */
      .tool-group-single {
        margin: 8px 0;
        padding-left: 12px;
      }

      .tool-group-container {
        margin: 8px 0;
      }

      .tool-group-header {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 12px;
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius-sm);
        transition: background var(--transition), color var(--transition);
      }

      .tool-group-header:hover {
        background: var(--surface);
        color: var(--text-secondary);
      }

      .tool-group-icon {
        display: flex;
        align-items: center;
        color: var(--muted);
      }

      .tool-group-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .tool-group-avatar .ai-label {
        font-size: 9px;
        font-weight: 700;
        color: #fff;
      }

      .tool-group-label {
        flex: 1;
      }

      .tool-group-spinner {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .tool-group-chevron {
        display: flex;
        align-items: center;
        color: var(--muted);
      }

      .tool-group-container.failed .tool-group-header {
        color: var(--danger);
      }

      .tool-group-container.failed .tool-group-icon {
        color: var(--danger);
      }

      .tool-group {
        display: flex;
        flex-direction: column;
        margin-top: 8px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .tool-item {
        display: flex;
        gap: 0;
        position: relative;
      }

      .tool-item-connector {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 20px;
        flex-shrink: 0;
      }

      .tool-item-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        border: 2px solid var(--bg);
        margin-top: 10px;
        z-index: 1;
      }

      .tool-item.failed .tool-item-dot {
        background: var(--danger);
      }

      .tool-item-line {
        width: 2px;
        flex: 1;
        background: var(--border);
        margin-top: -2px;
      }

      .tool-item-content {
        flex: 1;
        min-width: 0;
      }

      .tool-item-header {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 10px;
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius-sm);
        transition: background var(--transition), color var(--transition);
      }

      .tool-item-header:hover:not(:disabled) {
        background: var(--surface);
        color: var(--text-secondary);
      }

      .tool-item-header:disabled {
        cursor: default;
      }

      .tool-item-icon {
        display: flex;
        align-items: center;
        color: var(--muted);
      }

      .tool-item-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tool-item-chevron {
        display: flex;
        align-items: center;
        color: var(--muted);
        opacity: 0.6;
      }

      .tool-item-link {
        display: flex;
        align-items: center;
        padding: 2px 4px;
        color: var(--muted);
        opacity: 0;
        transition: opacity var(--transition), color var(--transition);
        cursor: pointer;
      }

      .tool-item-header:hover .tool-item-link {
        opacity: 1;
      }

      .tool-item-link:hover {
        color: var(--accent);
      }

      .tool-item-spinner {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .tool-item.failed .tool-item-header {
        color: var(--danger);
      }

      .tool-item.failed .tool-item-icon {
        color: var(--danger);
      }

      .tool-item-body {
        padding: 0 10px 10px 10px;
      }

      .tool-section {
        margin-bottom: 8px;
      }

      .tool-section:last-child {
        margin-bottom: 0;
      }

      .tool-section-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .tool-code {
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
        font-size: 11px;
        line-height: 1.5;
        color: var(--text-secondary);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        margin: 0;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 200px;
        overflow-y: auto;
      }

      .tool-code.muted {
        color: var(--muted);
      }

      .message-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .message-meta .pill {
        font-size: 9px;
        padding: 2px 6px;
      }

      .part {
        margin-top: 8px;
      }

      .part:first-child {
        margin-top: 0;
      }

      .part-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .part-body {
        white-space: pre-wrap;
      }

      .markdown-body p {
        margin: 0;
      }

      .markdown-body p + p {
        margin-top: 8px;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        margin: 0 0 8px;
        line-height: 1.35;
        font-weight: 700;
      }

      .markdown-body h1 { font-size: 1.35em; }
      .markdown-body h2 { font-size: 1.22em; }
      .markdown-body h3 { font-size: 1.12em; }
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 { font-size: 1em; }

      .markdown-body ul,
      .markdown-body ol {
        margin: 8px 0 0 18px;
        padding: 0;
      }

      .markdown-body li + li {
        margin-top: 4px;
      }

      .markdown-body blockquote {
        margin: 8px 0 0;
        padding: 6px 10px;
        border-left: 3px solid var(--border-2);
        background: var(--surface-2);
        color: var(--muted);
        border-radius: 4px;
      }

      .markdown-body code {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 0.9em;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 1px 5px;
      }

      .message.user .markdown-body code {
        background: rgba(0, 0, 0, 0.08);
        border-color: rgba(0, 0, 0, 0.12);
      }

      .markdown-body .md-pre {
        margin: 8px 0 0;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        overflow-x: auto;
      }

      .markdown-body .md-pre code {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 0;
        font-size: 11px;
        line-height: 1.5;
        display: block;
      }

      .message-error {
        background: rgba(255, 59, 48, 0.1);
        border: 1px solid rgba(255, 59, 48, 0.3);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        color: var(--danger);
        font-size: 12px;
        margin-top: 8px;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: var(--accent);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 0.8s ease-in-out infinite;
      }

      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      .thinking-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 12px;
      }

      .thinking-avatar {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .thinking-avatar-img {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }

      .thinking-indicator {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 0;
      }

      .thinking-dot {
        width: 6px;
        height: 6px;
        background: var(--muted);
        border-radius: 50%;
        animation: thinking 1.4s ease-in-out infinite;
      }

      .thinking-dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .thinking-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes thinking {
        0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
        30% { opacity: 1; transform: scale(1); }
      }

      /* Input Area */
      .approvals-inline {
        padding: 12px 16px;
        background: var(--surface-2);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .approvals-inline-header {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .approvals-inline .card {
        margin-bottom: 8px;
      }

      .input-container {
        padding: 12px 16px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 12px 14px;
        transition: border-color var(--transition);
      }

      .input-wrapper:focus-within {
        border-color: rgba(255, 255, 255, 0.3);
      }

      .input-wrapper textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        resize: none;
        outline: none;
        line-height: 1.4;
        max-height: 100px;
      }

      .input-wrapper textarea::placeholder {
        color: var(--muted);
      }

      .send-button {
        align-self: flex-end;
        width: 32px;
        height: 32px;
        background: var(--accent);
        border: none;
        border-radius: var(--radius-sm);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
        flex-shrink: 0;
      }

      .send-button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .send-button:disabled {
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted-2);
        cursor: not-allowed;
        opacity: 0.5;
      }

      .send-button svg {
        width: 16px;
        height: 16px;
      }

      /* Session Config Bar */
      .session-config-bar {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 10px 16px 12px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .session-config-field {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .session-config-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }

      .session-config-value {
        font-size: 12px;
        color: var(--muted);
      }

      .token-pill {
        font-size: 10px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.1);
        padding: 4px 8px;
        border-radius: 10px;
      }

      /* Setup Row */
      .setup-row {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        padding: 8px 12px;
        background: var(--surface-2);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .setup-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .setup-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .setup-select {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--text);
        cursor: pointer;
        outline: none;
        min-width: 70px;
      }

      .setup-select:focus {
        border-color: var(--accent);
      }

      .setup-input {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--text);
        outline: none;
        width: 70px;
      }

      .setup-input-wide {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        color: var(--text);
        outline: none;
        width: 120px;
      }

      .setup-input::placeholder,
      .setup-input-wide::placeholder {
        color: var(--muted-2);
      }

      .setup-input:focus,
      .setup-input-wide:focus {
        border-color: var(--accent);
      }

      .setup-new-btn {
        background: var(--accent);
        border: none;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: background var(--transition);
      }

      .setup-new-btn:hover {
        background: var(--accent-hover);
      }

      .setup-divider {
        width: 1px;
        height: 16px;
        background: var(--border-2);
        margin: 0 4px;
      }

      .setup-stream {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .setup-select-small {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 10px;
        color: var(--text);
        cursor: pointer;
        outline: none;
        width: 50px;
      }

      .setup-select-small:disabled,
      .setup-select:disabled,
      .setup-input:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .setup-stream-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        height: 24px;
        gap: 4px;
        padding: 0 8px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        transition: all var(--transition);
      }

      .setup-stream-btn span {
        font-size: 10px;
        line-height: 1;
      }

      .setup-stream-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .setup-stream-btn:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .setup-stream-btn:disabled:hover {
        border-color: var(--border-2);
        color: var(--muted);
      }

      .setup-stream-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .setup-config-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .setup-config-btn {
        border: 1px solid var(--border-2);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text-secondary);
      }

      .setup-config-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .setup-config-btn.error {
        color: var(--danger);
        border-color: rgba(255, 59, 48, 0.4);
      }

      .setup-version {
        font-size: 10px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        background: var(--surface);
        padding: 4px 8px;
        border-radius: 4px;
        margin-left: auto;
      }

      /* Debug Panel */
      .debug-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-panel);
      }

      .debug-tabs {
        display: flex;
        height: 41px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
        flex-shrink: 0;
        overflow-x: auto;
      }

      .debug-tab {
        height: 100%;
        padding: 0 16px;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
        transition: color var(--transition), border-color var(--transition);
        white-space: nowrap;
        display: flex;
        align-items: center;
      }

      .debug-tab:hover {
        color: var(--text-secondary);
      }

      .debug-tab.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      .debug-tab-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 16px;
        padding: 0 5px;
        margin-left: 6px;
        background: #3f3f46;
        color: #a1a1aa;
        font-size: 9px;
        font-weight: 700;
        border-radius: 8px;
      }

      .debug-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .debug-panel.collapsed .debug-content {
        display: none;
      }

      .debug-panel.collapsed .debug-tabs {
        flex-direction: column;
        height: auto;
        border-bottom: none;
        overflow: visible;
      }

      .debug-panel.collapsed .debug-tab {
        display: none;
      }

      .debug-collapse-btn {
        width: 28px;
        height: 28px;
        min-width: 28px;
        margin: 6px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--muted);
        cursor: pointer;
        transition: color var(--transition), border-color var(--transition), background var(--transition);
        flex-shrink: 0;
      }

      .debug-collapse-btn:hover {
        color: var(--text);
        border-color: var(--text-secondary);
        background: var(--surface);
      }

      .debug-panel.collapsed .debug-collapse-btn {
        margin: 6px auto;
      }

      /* Session Setup */
      .setup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .setup-grid .field.full {
        grid-column: 1 / -1;
      }

      .setup-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 12px;
        transition: border-color var(--transition);
      }

      .card:hover {
        border-color: rgba(255, 255, 255, 0.2);
      }

      .card:last-child {
        margin-bottom: 0;
      }

      .config-textarea {
        min-height: 130px;
      }

      .config-inline-error {
        margin-top: 8px;
        margin-bottom: 0;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .card-header-pills {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .spinner-icon {
        animation: spin 0.8s linear infinite;
      }

      .card-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .card-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .card-actions {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        margin-top: 10px;
      }

      .card-actions .button {
        width: auto;
        flex-shrink: 0;
      }

      /* ── Process form buttons ── */
      .process-run-form .button.primary,
      .process-create-form .button.primary {
        width: auto;
      }

      .process-detail > .button {
        align-self: flex-start;
      }

      /* ── Run Once tab ── */
      .process-run-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .process-run-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .process-run-row {
        display: flex;
        gap: 10px;
      }

      .process-run-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .process-run-field-grow {
        flex: 1;
        min-width: 0;
      }

      .process-run-field .setup-input {
        width: 100%;
      }

      .process-run-field textarea.setup-input {
        resize: vertical;
        min-height: 42px;
      }

      .process-advanced-toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 11px;
        cursor: pointer;
        padding: 2px 0;
        align-self: flex-start;
      }

      .process-advanced-toggle:hover {
        color: var(--text-secondary);
      }

      .process-run-result {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .process-run-result-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .process-run-output {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .process-run-output-section {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .process-run-output-section + .process-run-output-section {
        border-left: 1px solid var(--border);
      }

      .process-run-output-label {
        padding: 6px 12px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--muted);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: var(--surface-2);
      }

      .process-run-output-section .process-log-block {
        border: none;
        border-radius: 0;
        min-height: 80px;
      }

      /* ── Processes tab ── */
      .processes-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .desktop-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .desktop-state-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 12px;
      }

      .desktop-start-controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .desktop-screenshot-controls {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .desktop-checkbox-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        padding-bottom: 4px;
      }

      .desktop-advanced-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 8px;
      }

      .desktop-input-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .desktop-chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .desktop-command {
        margin-top: 6px;
        padding: 8px 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        overflow-x: auto;
      }

      .desktop-diagnostic-block + .desktop-diagnostic-block {
        margin-top: 14px;
      }

      .desktop-process-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }

      .desktop-process-item {
        padding: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .desktop-clipboard-text {
        margin: 4px 0 0;
        padding: 8px 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 120px;
        overflow-y: auto;
      }

      .desktop-window-item {
        padding: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .desktop-window-focused {
        border-color: var(--success);
        box-shadow: inset 0 0 0 1px var(--success);
      }

      .desktop-window-editor {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--border);
      }

      .desktop-launch-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        flex-wrap: wrap;
      }

      .desktop-mouse-pos {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .desktop-stream-hint {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .desktop-screenshot-empty {
        padding: 18px;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--muted);
        background: var(--surface);
        text-align: center;
      }

      .desktop-screenshot-frame {
        border-radius: calc(var(--radius) + 2px);
        overflow: hidden;
        border: 1px solid var(--border);
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.92)),
          radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 40%);
        padding: 10px;
      }

      .desktop-screenshot-image {
        display: block;
        width: 100%;
        height: auto;
        border-radius: var(--radius);
        background: rgba(0, 0, 0, 0.24);
      }

      .processes-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .processes-section-toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 2px 0;
        align-self: flex-start;
      }

      .processes-section-toggle:hover {
        color: var(--accent);
      }

      .processes-section-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      .processes-list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .process-create-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .process-checkbox-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .process-checkbox {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-secondary);
        cursor: pointer;
      }

      .process-checkbox input {
        margin: 0;
      }

      /* Process list items */
      .process-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .process-list-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background var(--transition);
      }

      .process-list-item:hover {
        background: var(--surface);
      }

      .process-list-item.selected {
        background: var(--surface);
      }

      .process-list-item-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .process-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--muted);
      }

      .process-status-dot.running {
        background: var(--success);
      }

      .process-status-dot.exited {
        background: var(--muted);
      }

      .process-list-item-cmd {
        font-size: 12px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .process-list-item-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        color: var(--muted);
        padding-left: 14px;
      }

      .process-list-item-id {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        opacity: 0.7;
      }

      .process-list-item-actions {
        display: flex;
        gap: 4px;
        padding-left: 14px;
        margin-top: 2px;
      }

      .process-list-item-actions .button {
        padding: 4px 8px;
        font-size: 11px;
      }

      /* Process detail panel */
      .process-detail {
        padding: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .process-detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .process-detail-cmd {
        font-size: 12px;
        color: var(--text);
        word-break: break-word;
      }

      .process-detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        font-size: 11px;
        color: var(--muted);
      }

      .process-detail-logs {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .process-detail-logs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .process-detail-logs-header .button {
        padding: 4px 8px;
        font-size: 11px;
      }

      .process-terminal-empty {
        margin-top: 4px;
        padding: 10px 12px;
        border: 1px dashed rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-sm);
        color: var(--muted);
        font-size: 11px;
      }

      /* Log block (shared) */
      .process-log-block {
        margin: 0;
        min-height: 80px;
        max-height: 280px;
        overflow: auto;
        padding: 10px 12px;
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(9, 9, 11, 0.95);
        color: #e4e4e7;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, monospace;
        font-size: 11px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .pill.success {
        background: rgba(48, 209, 88, 0.15);
        color: var(--success);
      }

      .pill.danger {
        background: rgba(255, 59, 48, 0.15);
        color: var(--danger);
      }

      .pill.neutral {
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }

      .pill.accent {
        background: rgba(255, 79, 0, 0.15);
        color: var(--accent);
      }

      /* Events */
      .event-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .event-item {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        overflow: hidden;
        transition: border-color var(--transition);
      }

      .event-item:hover {
        border-color: rgba(255, 255, 255, 0.12);
      }

      .event-item.expanded {
        border-color: rgba(255, 255, 255, 0.12);
      }

      .event-item.highlighted {
        outline: 2px solid var(--accent);
        outline-offset: 0;
        border-color: var(--accent);
      }

      .event-summary {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        background: transparent;
        border: none;
        color: inherit;
        text-align: left;
        cursor: pointer;
        transition: background var(--transition);
      }

      .event-summary:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .event-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
        flex-shrink: 0;
      }

      .event-summary-main {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .event-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .event-chevron {
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        transition: color var(--transition);
      }

      .event-summary:hover .event-chevron {
        color: var(--text-secondary);
      }

      .event-type {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .event-type.session,
      .event-type.session-started,
      .event-type.session-ended {
        color: var(--success);
      }

      .event-type.item,
      .event-type.item-started,
      .event-type.item-completed {
        color: var(--accent);
      }

      .event-type.item-delta {
        color: var(--cyan);
      }

      .event-type.error,
      .event-type.agent-unparsed {
        color: var(--danger);
      }

      .event-type.question,
      .event-type.question-requested,
      .event-type.question-resolved {
        color: var(--warning);
      }

      .event-type.permission,
      .event-type.permission-requested,
      .event-type.permission-resolved {
        color: var(--purple);
      }

      .event-icon.session,
      .event-icon.session-started,
      .event-icon.session-ended {
        color: var(--success);
        border-color: rgba(48, 209, 88, 0.35);
        background: rgba(48, 209, 88, 0.12);
      }

      .event-icon.item,
      .event-icon.item-started,
      .event-icon.item-completed {
        color: var(--accent);
        border-color: rgba(255, 79, 0, 0.35);
        background: rgba(255, 79, 0, 0.12);
      }

      .event-icon.item-delta {
        color: var(--cyan);
        border-color: rgba(100, 210, 255, 0.35);
        background: rgba(100, 210, 255, 0.12);
      }

      .event-icon.error,
      .event-icon.agent-unparsed {
        color: var(--danger);
        border-color: rgba(255, 59, 48, 0.35);
        background: rgba(255, 59, 48, 0.12);
      }

      .event-icon.question,
      .event-icon.question-requested,
      .event-icon.question-resolved {
        color: var(--warning);
        border-color: rgba(255, 159, 10, 0.35);
